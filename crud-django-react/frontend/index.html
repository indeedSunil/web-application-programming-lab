<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — CRUD with Django REST + React</title>
  <meta name="description" content="A beautiful task manager CRUD application built with Django REST Framework and React JS." />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- React + ReactDOM (production CDN) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel (transpile JSX in-browser) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* ─── Reset & Base ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-main:     #000000;
      --bg-card:     #0d0d0d;
      --bg-input:    #141414;
      --bg-hover:    #1c1c1c;
      --accent:      #ffffff;
      --accent-dim:  #888888;
      --accent-glow: rgba(255,255,255,0.05);
      --text-1:      #ffffff;
      --text-2:      #888888;
      --text-3:      #3a3a3a;
      --border:      #1f1f1f;
      --border-mid:  #2e2e2e;
      --radius-sm:   5px;
      --radius-md:   8px;
      --radius-lg:   10px;
      --shadow-card: 0 1px 0 #1a1a1a, 0 4px 24px rgba(0,0,0,0.6);
      --transition:  all 0.18s cubic-bezier(0.4,0,0.2,1);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-main);
      color: var(--text-1);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ─── Scrollbar ────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg-main); }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 99px; }

    /* ─── Layout ───────────────────────────────────────────────────────── */
    #root { min-height: 100vh; }

    .app-wrapper {
      max-width: 820px;
      margin: 0 auto;
      padding: 48px 24px 100px;
    }

    /* ─── Header ───────────────────────────────────────────────────────── */
    .app-header {
      text-align: center;
      margin-bottom: 52px;
      animation: fadeDown 0.5s ease both;
      border-bottom: 1px solid var(--border);
      padding-bottom: 36px;
    }
    .app-header .logo {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .app-header .logo-icon {
      width: 40px; height: 40px;
      background: #fff;
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      color: #000;
    }
    .app-header h1 {
      font-size: 1.9rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.03em;
    }
    .app-header p {
      color: var(--text-2);
      font-size: 0.85rem;
      font-weight: 400;
      margin-top: 2px;
      letter-spacing: 0.01em;
    }
    .tech-badges {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 16px;
    }
    .badge {
      padding: 3px 11px;
      border-radius: 3px;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 1px solid var(--border-mid);
      color: var(--text-2);
      background: transparent;
    }
    .badge-drf, .badge-react, .badge-rest { color: var(--text-2); border-color: var(--border-mid); }

    /* ─── Stats Bar ────────────────────────────────────────────────────── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      margin-bottom: 40px;
      animation: fadeUp 0.5s 0.05s ease both;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
      background: var(--border);
    }
    .stat-card {
      background: var(--bg-card);
      padding: 20px;
      text-align: center;
      transition: var(--transition);
    }
    .stat-card:hover { background: var(--bg-hover); }
    .stat-card .stat-num {
      font-size: 2rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 4px;
    }
    .stat-card .stat-label {
      font-size: 0.68rem;
      color: var(--text-2);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* ─── Form Card ────────────────────────────────────────────────────── */
    .form-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px;
      margin-bottom: 28px;
      animation: fadeUp 0.5s 0.1s ease both;
    }
    .form-card h2 {
      font-size: 0.78rem;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .form-card h2 .icon { color: #fff; }

    .form-grid { display: grid; gap: 14px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 540px) { .form-row { grid-template-columns: 1fr; } }

    label {
      display: block;
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--text-3);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    input[type="text"], textarea, select {
      width: 100%;
      padding: 10px 13px;
      background: var(--bg-input);
      border: 1px solid var(--border-mid);
      border-radius: var(--radius-sm);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      transition: var(--transition);
      outline: none;
    }
    input[type="text"]:focus, textarea:focus, select:focus {
      border-color: #fff;
      background: #1a1a1a;
    }
    input[type="text"]::placeholder, textarea::placeholder { color: var(--text-3); }
    textarea { resize: vertical; min-height: 80px; }
    select option { background: #111; color: #fff; }

    .form-actions { display: flex; gap: 10px; margin-top: 4px; }

    /* ─── Buttons ──────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: #fff;
      color: #000;
      border: 1px solid #fff;
    }
    .btn-primary:hover { background: #e0e0e0; border-color: #e0e0e0; }

    .btn-secondary {
      background: transparent;
      color: var(--text-2);
      border: 1px solid var(--border-mid);
    }
    .btn-secondary:hover { border-color: #555; color: #fff; }

    .btn-icon {
      padding: 7px 9px;
      font-size: 0.85rem;
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--text-3);
      border: 1px solid transparent;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: var(--transition);
    }
    .btn-icon:hover { background: var(--bg-hover); color: #fff; border-color: var(--border-mid); }
    .btn-icon.danger:hover  { color: #ccc; border-color: #3a3a3a; }
    .btn-icon.success:hover { color: #fff; border-color: #3a3a3a; }

    /* ─── Filters ──────────────────────────────────────────────────────── */
    .filters-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 20px;
      animation: fadeUp 0.5s 0.15s ease both;
    }
    .filter-group { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 200px; }
    .filter-group input { padding: 9px 12px; font-size: 0.85rem; }
    .filter-tabs { display: flex; gap: 1px; background: var(--border); border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--border); }
    .filter-tab {
      padding: 8px 16px;
      border: none;
      background: var(--bg-card);
      color: var(--text-2);
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: var(--transition);
      font-family: 'Inter', sans-serif;
    }
    .filter-tab:hover { background: var(--bg-hover); color: #fff; }
    .filter-tab.active { background: #fff; color: #000; }

    /* ─── Task List ────────────────────────────────────────────────────── */
    .task-list { display: flex; flex-direction: column; gap: 0; border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden; }

    .task-card {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 18px 20px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      transition: var(--transition);
      animation: slideIn 0.3s ease both;
      position: relative;
    }
    .task-card:last-child { border-bottom: none; }
    .task-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
    }
    .task-card.priority-high::before   { background: #fff; }
    .task-card.priority-medium::before { background: #555; }
    .task-card.priority-low::before    { background: #2a2a2a; }

    .task-card:hover { background: var(--bg-hover); }
    .task-card.completed-card { opacity: 0.45; }
    .task-card.completed-card .task-title { text-decoration: line-through; color: var(--text-3); }

    .task-checkbox {
      width: 20px; height: 20px;
      min-width: 20px;
      border-radius: 3px;
      border: 1.5px solid var(--border-mid);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 2px;
      transition: var(--transition);
      font-size: 11px;
      color: #000;
    }
    .task-checkbox:hover { border-color: #fff; }
    .task-checkbox.checked { background: #fff; border-color: #fff; color: #000; }

    .task-body { flex: 1; min-width: 0; }
    .task-title { font-weight: 600; font-size: 0.92rem; color: #fff; margin-bottom: 3px; letter-spacing: -0.01em; }
    .task-desc  { font-size: 0.8rem; color: var(--text-2); margin-bottom: 8px; line-height: 1.55; font-weight: 400; }

    .task-meta { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

    .priority-badge {
      font-size: 0.63rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 2px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .priority-badge.high   { color: #fff;  background: transparent; border: 1px solid #3a3a3a; }
    .priority-badge.medium { color: #777;  background: transparent; border: 1px solid #2a2a2a; }
    .priority-badge.low    { color: #444;  background: transparent; border: 1px solid #1f1f1f; }

    .task-date { font-size: 0.7rem; color: var(--text-3); font-variant-numeric: tabular-nums; }
    .task-actions { display: flex; gap: 2px; }

    /* ─── Edit Mode ────────────────────────────────────────────────────── */
    .task-edit-form { display: flex; flex-direction: column; gap: 10px; width: 100%; }
    .task-edit-form .form-row { grid-template-columns: 2fr 1fr; }
    .task-edit-actions { display: flex; gap: 8px; }

    /* ─── Empty State ──────────────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      animation: fadeUp 0.4s ease both;
    }
    .empty-state .empty-icon { font-size: 2.5rem; margin-bottom: 16px; opacity: 0.3; }
    .empty-state h3 { font-size: 1rem; color: #fff; margin-bottom: 6px; font-weight: 600; }
    .empty-state p  { font-size: 0.8rem; color: var(--text-2); }

    /* ─── Toast ────────────────────────────────────────────────────────── */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 1000;
    }
    .toast {
      padding: 11px 18px;
      border-radius: var(--radius-sm);
      font-size: 0.82rem;
      font-weight: 500;
      max-width: 300px;
      animation: toastIn 0.25s ease both;
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg-card);
      border: 1px solid var(--border-mid);
      color: var(--text-2);
      box-shadow: 0 8px 32px rgba(0,0,0,0.8);
    }
    .toast.success { border-color: #333; color: #aaa; }
    .toast.error   { border-color: #3a3a3a; color: #ccc; }
    .toast.info    { border-color: #2a2a2a; color: #888; }

    /* ─── Loading ──────────────────────────────────────────────────────── */
    .loading-spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border-mid);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 40px auto;
    }
    .loader-wrap { text-align: center; padding: 60px; color: var(--text-2); font-size: 0.82rem; }
    .loader-wrap p { margin-top: 14px; letter-spacing: 0.02em; }

    /* ─── Error Banner ─────────────────────────────────────────────────── */
    .error-banner {
      background: #111;
      border: 1px solid #333;
      border-radius: var(--radius-md);
      padding: 14px 18px;
      margin-bottom: 20px;
      color: #888;
      font-size: 0.82rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* ─── Animations ───────────────────────────────────────────────────── */
    @keyframes fadeDown { from { opacity:0; transform:translateY(-16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeUp   { from { opacity:0; transform:translateY(12px);  } to { opacity:1; transform:translateY(0); } }
    @keyframes slideIn  { from { opacity:0; } to { opacity:1; } }
    @keyframes spin     { to   { transform: rotate(360deg); } }
    @keyframes toastIn  { from { opacity:0; transform:translateX(20px);  } to { opacity:1; transform:translateX(0); } }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    /* ─── Config ────────────────────────────────────────────────────────── */
    const API_BASE = 'http://127.0.0.1:8000/api/tasks/';

    /* ─── Helpers ───────────────────────────────────────────────────────── */
    function fmtDate(iso) {
      return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    /* ─── API Layer ─────────────────────────────────────────────────────── */
    const api = {
      async get(filter = 'all', search = '') {
        let url = API_BASE + '?ordering=-created_at';
        if (filter === 'active')    url += '&completed=false';
        if (filter === 'completed') url += '&completed=true';
        if (search)                 url += `&search=${encodeURIComponent(search)}`;
        const r = await fetch(url); if (!r.ok) throw new Error('Failed to fetch tasks');
        const data = await r.json();
        return Array.isArray(data) ? data : (data.results || []);
      },
      async create(payload) {
        const r = await fetch(API_BASE, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
        if (!r.ok) throw new Error('Failed to create task');
        return r.json();
      },
      async update(id, payload) {
        const r = await fetch(`${API_BASE}${id}/`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload) });
        if (!r.ok) throw new Error('Failed to update task');
        return r.json();
      },
      async toggle(id) {
        const r = await fetch(`${API_BASE}${id}/toggle/`, { method:'POST' });
        if (!r.ok) throw new Error('Failed to toggle task');
        return r.json();
      },
      async remove(id) {
        const r = await fetch(`${API_BASE}${id}/`, { method:'DELETE' });
        if (!r.ok) throw new Error('Failed to delete task');
      },
    };

    /* ─── Toast Hook ────────────────────────────────────────────────────── */
    function useToasts() {
      const [toasts, setToasts] = useState([]);
      const show = useCallback((msg, type = 'info') => {
        const id = Date.now();
        setToasts(t => [...t, { id, msg, type }]);
        setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
      }, []);
      return { toasts, show };
    }

    /* ─── Stats Bar ─────────────────────────────────────────────────────── */
    function StatsBar({ tasks }) {
      const total     = tasks.length;
      const done      = tasks.filter(t => t.completed).length;
      const pending   = total - done;
      return (
        <div className="stats-bar">
          <div className="stat-card"><div className="stat-num">{total}</div><div className="stat-label">Total Tasks</div></div>
          <div className="stat-card"><div className="stat-num">{pending}</div><div className="stat-label">Pending</div></div>
          <div className="stat-card"><div className="stat-num">{done}</div><div className="stat-label">Completed</div></div>
        </div>
      );
    }

    /* ─── Create / Edit Form ────────────────────────────────────────────── */
    function TaskForm({ onCreated, toast }) {
      const [form, setForm] = useState({ title:'', description:'', priority:'medium' });
      const [saving, setSaving] = useState(false);
      const titleRef = useRef(null);

      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

      async function handleSubmit(e) {
        e.preventDefault();
        if (!form.title.trim()) { toast('Please enter a task title.', 'error'); return; }
        setSaving(true);
        try {
          const task = await api.create({ ...form, completed: false });
          onCreated(task);
          setForm({ title:'', description:'', priority:'medium' });
          titleRef.current?.focus();
          toast('✅ Task created!', 'success');
        } catch (err) {
          toast('❌ ' + err.message, 'error');
        } finally { setSaving(false); }
      }

      return (
        <div className="form-card">
          <h2><span className="icon">✦</span> Add New Task</h2>
          <form onSubmit={handleSubmit}>
            <div className="form-grid">
              <div className="form-row">
                <div>
                  <label>Task Title *</label>
                  <input ref={titleRef} type="text" placeholder="What needs to be done?" value={form.title} onChange={e => set('title', e.target.value)} />
                </div>
                <div>
                  <label>Priority</label>
                  <select value={form.priority} onChange={e => set('priority', e.target.value)}>
                    <option value="low">🟢 Low</option>
                    <option value="medium">🟡 Medium</option>
                    <option value="high">🔴 High</option>
                  </select>
                </div>
              </div>
              <div>
                <label>Description (optional)</label>
                <textarea placeholder="Add details, notes, or context…" value={form.description} onChange={e => set('description', e.target.value)} />
              </div>
              <div className="form-actions">
                <button className="btn btn-primary" type="submit" disabled={saving}>
                  {saving ? '⏳ Saving…' : '＋ Add Task'}
                </button>
                <button className="btn btn-secondary" type="button" onClick={() => setForm({ title:'', description:'', priority:'medium' })}>
                  Clear
                </button>
              </div>
            </div>
          </form>
        </div>
      );
    }

    /* ─── Inline Edit Form ──────────────────────────────────────────────── */
    function EditForm({ task, onSaved, onCancel, toast }) {
      const [form, setForm] = useState({ title: task.title, description: task.description, priority: task.priority });
      const [saving, setSaving] = useState(false);
      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

      async function handleSave() {
        if (!form.title.trim()) { toast('Title cannot be empty.', 'error'); return; }
        setSaving(true);
        try {
          const updated = await api.update(task.id, { ...form, completed: task.completed });
          onSaved(updated);
          toast('📝 Task updated!', 'success');
        } catch (err) {
          toast('❌ ' + err.message, 'error');
        } finally { setSaving(false); }
      }

      return (
        <div className="task-edit-form">
          <div className="form-row">
            <div>
              <label>Title</label>
              <input type="text" value={form.title} onChange={e => set('title', e.target.value)} autoFocus />
            </div>
            <div>
              <label>Priority</label>
              <select value={form.priority} onChange={e => set('priority', e.target.value)}>
                <option value="low">🟢 Low</option>
                <option value="medium">🟡 Medium</option>
                <option value="high">🔴 High</option>
              </select>
            </div>
          </div>
          <div>
            <label>Description</label>
            <textarea value={form.description} onChange={e => set('description', e.target.value)} />
          </div>
          <div className="task-edit-actions">
            <button className="btn btn-primary" onClick={handleSave} disabled={saving}>
              {saving ? '⏳ Saving…' : '💾 Save'}
            </button>
            <button className="btn btn-secondary" onClick={onCancel}>Cancel</button>
          </div>
        </div>
      );
    }

    /* ─── Task Card ─────────────────────────────────────────────────────── */
    function TaskCard({ task, onToggle, onDelete, onUpdate, toast }) {
      const [editing,  setEditing]  = useState(false);
      const [deleting, setDeleting] = useState(false);
      const [toggling, setToggling] = useState(false);
      const [confirmDelete, setConfirmDelete] = useState(false);

      async function handleToggle() {
        setToggling(true);
        try {
          const updated = await api.toggle(task.id);
          onToggle(updated);
          toast(updated.completed ? '✅ Marked complete!' : '↩️ Marked active', 'info');
        } catch (err) { toast('❌ ' + err.message, 'error'); }
        finally { setToggling(false); }
      }

      async function handleDelete() {
        setDeleting(true);
        try {
          await api.remove(task.id);
          onDelete(task.id);
          toast('🗑️ Task deleted', 'info');
        } catch (err) { 
          toast('❌ ' + err.message, 'error'); 
          setDeleting(false);
        }
      }

      return (
        <div className={`task-card priority-${task.priority} ${task.completed ? 'completed-card' : ''}`}>
          {/* Checkbox */}
          <div
            className={`task-checkbox ${task.completed ? 'checked' : ''}`}
            onClick={handleToggle}
            title={task.completed ? 'Mark incomplete' : 'Mark complete'}
          >
            {toggling ? '⏳' : task.completed ? '✓' : ''}
          </div>

          {/* Body */}
          <div className="task-body">
            {editing ? (
              <EditForm
                task={task}
                onSaved={updated => { onUpdate(updated); setEditing(false); }}
                onCancel={() => setEditing(false)}
                toast={toast}
              />
            ) : (
              <>
                <div className="task-title">{task.title}</div>
                {task.description && <div className="task-desc">{task.description}</div>}
                <div className="task-meta">
                  <span className={`priority-badge ${task.priority}`}>{task.priority}</span>
                  <span className="task-date">📅 {fmtDate(task.created_at)}</span>
                  {task.completed && <span className="task-date">🏁 Done</span>}
                </div>
              </>
            )}
          </div>

          {/* Actions */}
          {!editing && (
            <div className="task-actions">
              {confirmDelete ? (
                <>
                  <span style={{ fontSize: '0.75rem', color: 'var(--text-2)', marginRight: '6px', display: 'flex', alignItems: 'center' }}>Delete?</span>
                  <button className="btn-icon danger" title="Confirm Delete" onClick={handleDelete} disabled={deleting}>
                    {deleting ? '⏳' : '✓'}
                  </button>
                  <button className="btn-icon" title="Cancel" onClick={() => setConfirmDelete(false)}>✗</button>
                </>
              ) : (
                <>
                  <button className="btn-icon success" title="Edit" onClick={() => setEditing(true)}>✏️</button>
                  <button className="btn-icon danger"  title="Delete" onClick={() => setConfirmDelete(true)}>
                    🗑️
                  </button>
                </>
              )}
            </div>
          )}
        </div>
      );
    }

    /* ─── Toasts ─────────────────────────────────────────────────────────── */
    function ToastContainer({ toasts }) {
      return (
        <div className="toast-container">
          {toasts.map(t => (
            <div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>
          ))}
        </div>
      );
    }

    /* ─── App ─────────────────────────────────────────────────────────────── */
    function App() {
      const [tasks,   setTasks]   = useState([]);
      const [loading, setLoading] = useState(true);
      const [error,   setError]   = useState('');
      const [filter,  setFilter]  = useState('all');
      const [search,  setSearch]  = useState('');
      const { toasts, show: toast } = useToasts();
      const searchTimer = useRef(null);

      const loadTasks = useCallback(async (f = filter, s = search) => {
        setLoading(true); setError('');
        try {
          const data = await api.get(f, s);
          setTasks(data);
        } catch (err) {
          setError(err.message + ' — Make sure the Django server is running on port 8000.');
        } finally { setLoading(false); }
      }, [filter, search]);

      useEffect(() => { loadTasks(filter, search); }, [filter]);

      // Debounced search
      useEffect(() => {
        clearTimeout(searchTimer.current);
        searchTimer.current = setTimeout(() => loadTasks(filter, search), 400);
        return () => clearTimeout(searchTimer.current);
      }, [search]);

      const handleCreated = task => setTasks(t => [task, ...t]);
      const handleToggle  = updated => setTasks(t => t.map(x => x.id === updated.id ? updated : x));
      const handleUpdate  = updated => setTasks(t => t.map(x => x.id === updated.id ? updated : x));
      const handleDelete  = id => setTasks(t => t.filter(x => x.id !== id));

      const filterChange = f => { setFilter(f); };

      return (
        <div className="app-wrapper">
          {/* Header */}
          <header className="app-header">
            <div className="logo">
              <div className="logo-icon">✦</div>
              <h1>TaskFlow</h1>
            </div>
            <p>Full-Stack CRUD — Django REST Framework + React JS</p>
            <div className="tech-badges">
              <span className="badge badge-drf">Django REST Framework</span>
              <span className="badge badge-react">React 18</span>
              <span className="badge badge-rest">REST API</span>
            </div>
          </header>

          {/* Stats */}
          <StatsBar tasks={tasks} />

          {/* Create Form */}
          <TaskForm onCreated={handleCreated} toast={toast} />

          {/* Filters */}
          <div className="filters-row">
            <div className="filter-group">
              <input
                type="text"
                placeholder="🔍  Search tasks…"
                value={search}
                onChange={e => setSearch(e.target.value)}
              />
            </div>
            <div className="filter-tabs">
              {['all','active','completed'].map(f => (
                <button
                  key={f}
                  className={`filter-tab ${filter === f ? 'active' : ''}`}
                  onClick={() => filterChange(f)}
                >
                  {f.charAt(0).toUpperCase() + f.slice(1)}
                </button>
              ))}
            </div>
          </div>

          {/* Error */}
          {error && (
            <div className="error-banner">
              ⚠️ {error}
            </div>
          )}

          {/* Task List */}
          {loading ? (
            <div className="loader-wrap">
              <div className="loading-spinner" />
              <p>Fetching tasks from API…</p>
            </div>
          ) : tasks.length === 0 ? (
            <div className="empty-state">
              <div className="empty-icon">{search ? '🔍' : '📋'}</div>
              <h3>{search ? 'No tasks match your search' : 'No tasks yet!'}</h3>
              <p>{search ? 'Try a different keyword.' : 'Add your first task above to get started.'}</p>
            </div>
          ) : (
            <div className="task-list">
              {tasks.map(task => (
                <TaskCard
                  key={task.id}
                  task={task}
                  onToggle={handleToggle}
                  onDelete={handleDelete}
                  onUpdate={handleUpdate}
                  toast={toast}
                />
              ))}
            </div>
          )}

          {/* Toasts */}
          <ToastContainer toasts={toasts} />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
